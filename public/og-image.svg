<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#ffffff"/>
  <!-- subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.4"/>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e8e7e3" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- QR icon -->
  <g transform="translate(136, 195)">
    <!-- top-left finder -->
    <rect x="0" y="0" width="90" height="90" rx="14" fill="#1a1a18"/>
    <rect x="14" y="14" width="62" height="62" rx="8" fill="#fff"/>
    <rect x="26" y="26" width="38" height="38" rx="4" fill="#1a1a18"/>
    <!-- top-right finder -->
    <rect x="150" y="0" width="90" height="90" rx="14" fill="#1a1a18"/>
    <rect x="164" y="14" width="62" height="62" rx="8" fill="#fff"/>
    <rect x="176" y="26" width="38" height="38" rx="4" fill="#1a1a18"/>
    <!-- bottom-left finder -->
    <rect x="0" y="150" width="90" height="90" rx="14" fill="#1a1a18"/>
    <rect x="14" y="164" width="62" height="62" rx="8" fill="#fff"/>
    <rect x="26" y="176" width="38" height="38" rx="4" fill="#1a1a18"/>
    <!-- data dots -->
    <rect x="150" y="150" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="187" y="150" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="214" y="150" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="150" y="187" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="214" y="187" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="150" y="214" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="187" y="214" width="26" height="26" rx="4" fill="#1a1a18"/>
    <rect x="214" y="214" width="26" height="26" rx="4" fill="#1a1a18"/>
  </g>

  <!-- text -->
  <text x="520" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="500" fill="#1a1a18" letter-spacing="-2">Quick QR-Code</text>
  <text x="520" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="500" fill="#1a1a18" letter-spacing="-2">Generator</text>
  <text x="522" y="400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="300" fill="#a0a09a" letter-spacing="-0.5">Paste a link. Get a QR code.</text>
</svg>
