<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quick QR-Code Generator</title>
    <meta name="description" content="The fastest QR code generator. Paste a link, get a QR code instantly — no sign-up, no ads." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Quick QR-Code Generator" />
    <meta property="og:description" content="The fastest QR code generator. Paste a link, get a QR code instantly." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Quick QR-Code Generator — paste a link, get a QR code" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quick QR-Code Generator" />
    <meta name="twitter:description" content="The fastest QR code generator. Paste a link, get a QR code instantly." />
    <meta name="twitter:image" content="/og-image.svg" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="quickqr" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
